    <title>Login</title>

<body>
  <!-- Aba de navegação -->
    <header>
        <nav>
            <ul class="nav-list">
                <li id="toggle"><i class="fa-solid fa-sun"></i></li>
                <li id="increaseFont"><i class="fa-solid fa-plus"></i></li>
                <li id="decreaseFont"><i class="fa-solid fa-minus"></i></li>
                <li class="active-nav-list-li">Login</li>

        <div class="Linha"></div>

<!-- Conteúdo login -->
    <main>
    <div class="conteudo-login">
        <div class="left-section" id="left-section">
          <div class="login-container">
                <div class="texto">
                    <h1>Coffee</h1>
                    <h3>RH</h3>
                    <p>Faça seu Login</p>
                </div>
                <form id="form">
                    <div class="form-control">
                        <label for="indexLogin">Login:</label>
                        <input
                          type="text"
                          id="indexLogin"
                          placeholder="Digite seu Login."
                          maxlength="6"
                          oninput="this.value = this.value.toLowerCase();" 
                        />
                        <i class="fas fa-exclamation-circle" style="margin-top: 5px;"></i>
                        <i class="fas fa-check-circle" style="margin-top: 5px;"></i>
                        <small>Mensagem de erro</small>
                      </div>
                      
                      <div class="form-control">
                        <label for="indexPassword">Senha:</label>
                        <input
                        type="password"
                        id="indexPassword"
                        placeholder="Digite sua senha."
                        maxlength="8"
                        oninput="this.value = this.value.toLowerCase();" 
                        />
                        <i class="fas fa-exclamation-circle" style="margin-top: 5px;"></i>
                        <i class="fas fa-check-circle" style="margin-top: 5px;"></i>
                        <small>Mensagem de erro</small>
                      </div>
                    <button type="button" onclick="matchInputs()" style="transform: translate(195px,5px); padding: 10px 18px;">Entrar</button>
                </form>
            </div>
        </div>
        <div class="right-section"></div>
    </div>
